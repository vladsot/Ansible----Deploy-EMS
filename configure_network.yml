---
- name: Configure network safely
  hosts: localhost
  become: yes
  connection: local

  vars:
    interface: "{{ ansible_default_ipv4.interface }}"
    backup_dir: "/tmp/net_backup_{{ ansible_date_time.epoch }}"
    rollback_script: "/tmp/net_rollback.sh"
    apply_delay: 15
    log_file: "/var/log/network_config_{{ ansible_date_time.epoch }}.log"
    ssh_repo: "https://github.com/vladsot/ssh.git"
    ssh_tmp_dir: "/tmp/ssh_keys_repo"

  tasks:

    - name: Show log file location
      debug:
        msg: "Logging to {{ log_file }}"

    - name: Start log
      shell: "echo '=== START $(date) ===' >> {{ log_file }}"

    # =========================
    # OS DETECTION
    # =========================
    - name: Detect OS family
      set_fact:
        is_debian: "{{ ansible_facts.os_family == 'Debian' }}"
        is_redhat: "{{ ansible_facts.os_family == 'RedHat' }}"

    # =========================
    # INSTALL REQUIRED PACKAGES
    # =========================
    - name: Install required packages (Debian)
      when: is_debian
      apt:
        name:
          - rsync
          - iputils-arping
          - vim
          - git
        state: present
        update_cache: yes

    - name: Install required packages (RHEL)
      when: is_redhat
      yum:
        name:
          - rsync
          - arping
          - vim
          - git
        state: present

    - name: Log package installation
      shell: "echo 'Packages ensured: rsync, arping, vim, git' >> {{ log_file }}"

    # =========================
    # SSH KEY SETUP
    # =========================
    - name: Clone SSH key repository
      git:
        repo: "{{ ssh_repo }}"
        dest: "{{ ssh_tmp_dir }}"
        force: yes

    - name: Ensure root .ssh directory exists
      file:
        path: /root/.ssh
        state: directory
        mode: '0700'

    - name: Append public keys to authorized_keys
      shell: "cat {{ ssh_tmp_dir }}/*.pub >> /root/.ssh/authorized_keys"
      args:
        creates: "/root/.ssh/authorized_keys"

    - name: Ensure correct permissions on authorized_keys
      file:
        path: /root/.ssh/authorized_keys
        mode: '0600'

    - name: Log SSH key setup
      shell: "echo 'SSH keys installed from repo' >> {{ log_file }}"

    # =========================
    # SSH HARDENING
    # =========================
    - name: Set PermitRootLogin
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin prohibit-password'

    - name: Check if AllowUsers exists
      shell: "grep '^AllowUsers' /etc/ssh/sshd_config"
      register: allowusers_check
      ignore_errors: yes
      changed_when: false

    - name: Add root to AllowUsers if exists
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^AllowUsers'
        line: "{{ allowusers_check.stdout }} root"
      when: allowusers_check.rc == 0 and ('root' not in allowusers_check.stdout)

    - name: Restart SSH service
      shell: "systemctl restart ssh || systemctl restart sshd"

    - name: Log SSH hardening
      shell: "echo 'SSH hardened (PermitRootLogin + AllowUsers)' >> {{ log_file }}"

    # =========================
    # VALIDATION
    # =========================
    - name: Validate IPv4 format
      assert:
        that:
          - ip_address is match("^(?:[0-9]{1,3}\\.){3}[0-9]{1,3}$")
          - gateway is match("^(?:[0-9]{1,3}\\.){3}[0-9]{1,3}$")
          - subnet_mask | int >= 0
          - subnet_mask | int <= 32
          - dns_servers | length > 0

    - name: Validate each DNS entry
      assert:
        that: item is match("^(?:[0-9]{1,3}\\.){3}[0-9]{1,3}$")
      loop: "{{ dns_servers }}"

    # =========================
    # BACKUP
    # =========================
    - name: Create backup directory
      file:
        path: "{{ backup_dir }}"
        state: directory

    - name: Log backup start
      shell: "echo 'Backing up network config to {{ backup_dir }}' >> {{ log_file }}"

    - name: Backup netplan
      when: is_debian
      shell: "rsync -a /etc/netplan/ {{ backup_dir }}/netplan/ 2>>{{ log_file }} || true"

    - name: Backup RHEL configs
      when: is_redhat
      shell: "rsync -a /etc/sysconfig/network-scripts/ {{ backup_dir }}/network-scripts/ 2>>{{ log_file }} || true"

    # =========================
    # ROLLBACK SCRIPT
    # =========================
    - name: Create rollback script
      copy:
        dest: "{{ rollback_script }}"
        mode: '0755'
        content: |
          #!/bin/bash
          echo "ROLLBACK TRIGGERED $(date)" >> {{ log_file }}

          if [ -d "{{ backup_dir }}/netplan" ]; then
            rm -rf /etc/netplan/*
            rsync -a {{ backup_dir }}/netplan/ /etc/netplan/
            netplan apply >> {{ log_file }} 2>&1
          fi

          if [ -d "{{ backup_dir }}/network-scripts" ]; then
            rm -rf /etc/sysconfig/network-scripts/*
            rsync -a {{ backup_dir }}/network-scripts/ /etc/sysconfig/network-scripts/
            systemctl restart network >> {{ log_file }} 2>&1 || systemctl restart NetworkManager >> {{ log_file }} 2>&1
          fi

    # =========================
    # SCHEDULE ROLLBACK
    # =========================
    - name: Schedule rollback
      shell: "nohup bash -c 'sleep 120 && {{ rollback_script }}' >> {{ log_file }} 2>&1 &"

    # =========================
    # WARNING DELAY
    # =========================
    - name: Warning before applying
      pause:
        seconds: "{{ apply_delay }}"

    # =========================
    # APPLY NETWORK
    # =========================
    - name: Log apply start
      shell: "echo 'Applying network config on {{ interface }}' >> {{ log_file }}"

    - name: Apply netplan config
      when: is_debian
      copy:
        dest: /etc/netplan/99-custom.yaml
        content: |
          network:
            version: 2
            renderer: networkd
            ethernets:
              {{ interface }}:
                dhcp4: no
                addresses:
                  - {{ ip_address }}/{{ subnet_mask }}
                routes:
                  - to: default
                    via: {{ gateway }}
                nameservers:
                  addresses: {{ dns_servers }}

    - name: Apply netplan
      when: is_debian
      shell: "netplan apply >> {{ log_file }} 2>&1"

    - name: Configure RHEL network
      when: is_redhat
      copy:
        dest: "/etc/sysconfig/network-scripts/ifcfg-{{ interface }}"
        content: |
          DEVICE={{ interface }}
          BOOTPROTO=none
          ONBOOT=yes
          IPADDR={{ ip_address }}
          PREFIX={{ subnet_mask }}
          GATEWAY={{ gateway }}
          DNS1={{ dns_servers[0] }}
          DNS2={{ dns_servers[1] | default('') }}

    - name: Restart network
      when: is_redhat
      shell: "systemctl restart network >> {{ log_file }} 2>&1 || systemctl restart NetworkManager >> {{ log_file }} 2>&1"

    # =========================
    # CONNECTIVITY CHECK (ARP)
    # =========================
    - name: Wait for SSH
      wait_for:
        port: 22
        timeout: 60

    - name: ARP check to gateway
      shell: "arping -c 3 -I {{ interface }} {{ gateway }} >> {{ log_file }} 2>&1"
      register: arp_result
      retries: 3
      delay: 3
      until: arp_result.rc == 0

    # =========================
    # CANCEL ROLLBACK
    # =========================
    - name: Cancel rollback
      shell: "pkill -f '{{ rollback_script }}' >> {{ log_file }} 2>&1 || true"
      when: arp_result.rc == 0

    - name: Log success
      shell: "echo 'SUCCESS $(date)' >> {{ log_file }}"
      when: arp_result.rc == 0

    - name: Fail if unreachable
      fail:
        msg: "Gateway unreachable. Rollback will execute."
      when: arp_result.rc != 0